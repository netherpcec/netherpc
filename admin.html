<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Panel Admin · NetherPC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --brand:#00b4d8; --brand-dark:#0096b5; --dark:#0e1320; --dark-2:#161c2b;
  --ink:#1a1f2e; --ink-soft:#404757; --muted:#8891a4; --line:#e7eaf0; --line-2:#d4d9e3;
  --surface:#f5f7fa; --ok:#18b26b; --danger:#e23b3b; --warn:#c77700;
  --radius:12px; --shadow:0 4px 20px rgba(20,30,60,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--surface);color:var(--ink);font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--brand);text-decoration:none}

/* ===== LOGIN ===== */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--dark)}
.login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo img{height:56px}
.login-logo .fallback{font-size:26px;font-weight:800;letter-spacing:.5px}
.login-logo .fallback span{color:var(--brand)}
.login-card h1{font-size:19px;font-weight:700;text-align:center;margin-bottom:6px}
.login-card .sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:26px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:7px}
.field input{width:100%;height:46px;border:1.5px solid var(--line-2);border-radius:10px;padding:0 14px;font-size:14px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--brand)}
.btn-login{width:100%;height:48px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{background:var(--brand-dark)}
.btn-login:disabled{background:#b5bcc9;cursor:not-allowed}
.login-error{background:#fdeaea;color:var(--danger);font-size:13px;padding:11px 14px;border-radius:9px;margin-bottom:16px;display:none;align-items:center;gap:8px}
.login-error.show{display:flex}

/* ===== APP SHELL ===== */
.app{display:none;min-height:100vh}
.app.show{display:grid;grid-template-columns:240px 1fr}
.sidebar{background:var(--dark);color:#c8cfdd;padding:22px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:0 22px 22px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:16px}
.sb-logo img{height:36px}
.sb-logo .fallback{font-size:18px;font-weight:800;color:#fff}
.sb-logo .fallback span{color:var(--brand)}
.sb-nav{padding:0 12px}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:9px;color:#c8cfdd;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:3px;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:var(--brand);color:#fff}
.sb-item i{font-size:19px}
.sb-foot{padding:16px 12px;margin-top:auto;border-top:1px solid rgba(255,255,255,.08)}
.sb-user{font-size:12px;color:var(--muted);padding:0 14px 10px}
.sb-logout{display:flex;align-items:center;gap:9px;padding:10px 14px;border-radius:9px;color:#ff8a8a;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;width:100%}
.sb-logout:hover{background:rgba(226,59,59,.12)}

.main{padding:0}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h2{font-size:18px;font-weight:700}
.content{padding:28px}

/* Placeholder de secciones (Etapa 1) */
.coming{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:50px 30px;text-align:center;color:var(--muted)}
.coming i{font-size:48px;color:#cfd5e0;display:block;margin-bottom:14px}
.coming b{display:block;color:var(--ink-soft);font-size:17px;margin-bottom:6px}

.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark)}
.spinner{width:42px;height:42px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

@media(max-width:720px){
  .app.show{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;z-index:100;transform:translateX(-100%);transition:transform .25s;width:240px}
  .sidebar.open{transform:none}
  .mobile-toggle{display:flex!important}
}
.mobile-toggle{display:none;width:40px;height:40px;border:1px solid var(--line);border-radius:9px;background:#fff;align-items:center;justify-content:center;font-size:20px;color:var(--ink)}
</style>
</head>
<body>

<!-- PANTALLA DE CARGA -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
</div>

<!-- LOGIN -->
<div class="login-screen" id="login" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <img src="img/logo.png" alt="NetherPC" onerror="this.outerHTML='<div class=\'fallback\'>NETHER<span>PC</span></div>'">
    </div>
    <h1>Panel de administración</h1>
    <p class="sub">Ingresa con tu cuenta de administrador</p>
    <div class="login-error" id="login-error"><i class="ti ti-alert-circle"></i> <span id="login-error-msg"></span></div>
    <div class="field">
      <label>Correo</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login"><i class="ti ti-login-2"></i> Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <img src="img/logo.png" alt="NetherPC" onerror="this.outerHTML='<div class=\'fallback\'>NETHER<span>PC</span></div>'">
    </div>
    <nav class="sb-nav">
      <button class="sb-item active" data-sec="productos"><i class="ti ti-package"></i> Productos</button>
      <button class="sb-item" data-sec="variantes"><i class="ti ti-versions"></i> Variantes</button>
      <button class="sb-item" data-sec="resenas"><i class="ti ti-star"></i> Reseñas</button>
    </nav>
    <div class="sb-foot">
      <div class="sb-user" id="sb-user"></div>
      <button class="sb-logout" id="btn-logout"><i class="ti ti-logout"></i> Cerrar sesión</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="mobile-toggle" id="mobile-toggle"><i class="ti ti-menu-2"></i></button>
      <h2 id="sec-title">Productos</h2>
    </div>
    <div class="content" id="content">
      <!-- Etapa 1: placeholders. Las siguientes etapas llenan esto. -->
      <div class="coming">
        <i class="ti ti-tools"></i>
        <b>Panel en construcción</b>
        <span>El login ya funciona. La gestión de productos llega en la siguiente etapa.</span>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nbvbjulnqczwweuqgebk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bodORUr420PZJCi0l5VxTQ_kUa-Xi-I';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = id => document.getElementById(id);

function showScreen(which){
  $('loading').style.display = which==='loading' ? 'flex' : 'none';
  $('login').style.display = which==='login' ? 'flex' : 'none';
  $('app').classList.toggle('show', which==='app');
}

/* ===== Verificar sesión al cargar ===== */
async function checkSession(){
  const { data } = await sb.auth.getSession();
  if(data.session){
    onLoggedIn(data.session.user);
  } else {
    showScreen('login');
  }
}

function onLoggedIn(user){
  $('sb-user').textContent = user.email;
  showScreen('app');
}

/* ===== Login ===== */
async function doLogin(){
  const email = $('email').value.trim();
  const password = $('password').value;
  const errBox = $('login-error');
  errBox.classList.remove('show');
  if(!email || !password){
    showLoginError('Ingresa tu correo y contraseña.');
    return;
  }
  const btn = $('btn-login');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2"></i> Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-login-2"></i> Entrar';
  if(error){
    showLoginError(error.message === 'Invalid login credentials'
      ? 'Correo o contraseña incorrectos.'
      : error.message);
    return;
  }
  onLoggedIn(data.user);
}

function showLoginError(msg){
  $('login-error-msg').textContent = msg;
  $('login-error').classList.add('show');
}

/* ===== Logout ===== */
async function doLogout(){
  await sb.auth.signOut();
  $('email').value = ''; $('password').value = '';
  showScreen('login');
}

/* ===== Navegación entre secciones ===== */
const SECCIONES = { productos:'Productos', variantes:'Variantes', resenas:'Reseñas' };
function irSeccion(sec){
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active', b.dataset.sec===sec));
  $('sec-title').textContent = SECCIONES[sec] || sec;
  $('sidebar').classList.remove('open');
  // Etapa 1: solo placeholder. Etapas siguientes renderizan cada sección.
}

/* ===== Eventos ===== */
$('btn-login').addEventListener('click', doLogin);
$('password').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
$('email').addEventListener('keydown', e=>{ if(e.key==='Enter') $('password').focus(); });
$('btn-logout').addEventListener('click', doLogout);
document.querySelectorAll('.sb-item').forEach(b=>b.addEventListener('click', ()=>irSeccion(b.dataset.sec)));
$('mobile-toggle').addEventListener('click', ()=>$('sidebar').classList.toggle('open'));

/* Iniciar */
checkSession();
</script>
</body>
</html>
